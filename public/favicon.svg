<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <style>
      .background { fill: #0f172a; }
      .icon { fill: #2563eb; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="background" width="256" height="256"/>
  
  <!-- Ticket/Document Icon -->
  <g class="icon" transform="translate(64, 48)">
    <!-- Document body -->
    <rect x="16" y="0" width="96" height="160" rx="4" fill="none" stroke="currentColor" stroke-width="8"/>
    
    <!-- Horizontal lines (representing text/ticket details) -->
    <line x1="32" y1="32" x2="96" y2="32" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
    <line x1="32" y1="56" x2="112" y2="56" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
    <line x1="32" y1="80" x2="112" y2="80" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
    <line x1="32" y1="104" x2="80" y2="104" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Checkmark for completion -->
    <path d="M 80 132 L 96 148 L 128 116" stroke="currentColor" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
